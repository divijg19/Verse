services:
  - type: web
    name: verse
    runtime: go
    buildCommand: |
      bun install
      bunx @tailwindcss/cli -i ./static/css/input.css -o ./static/css/output.css --minify
      go build -tags netgo -ldflags="-s -w" -o verse ./cmd/server
    startCommand: ./verse
    envVars:
      - key: DATABASE_URL
        sync: false