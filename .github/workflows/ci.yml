name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6 
        with:
            go-version-file: 'go.mod'
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Bun dependencies
        run: bun ci

      - name: Regenerate templ artifacts
        run: |
          set -euo pipefail
          # Ensure module metadata is available
          go mod download

          # Try to get the templ module version from 'go list -m'
          TEMPL_VER="$(go list -m -f '{{.Version}}' github.com/a-h/templ 2>/dev/null || true)"

          # Fallback to parsing go.mod if go list didn't return a version
          if [ -z "$TEMPL_VER" ]; then
            TEMPL_VER="$(grep -E '\bgithub.com/a-h/templ\b' go.mod | awk '{print $2}' || true)"
          fi

          if [ -z "$TEMPL_VER" ]; then
            echo "templ version not found in go list or go.mod; generating with latest"
            go run github.com/a-h/templ/cmd/templ@latest generate ./templ
          else
            echo "Using templ version: $TEMPL_VER"
            go run github.com/a-h/templ/cmd/templ@${TEMPL_VER} generate ./templ
          fi

      - name: Build Tailwind CSS
        run: bunx @tailwindcss/cli -i ./static/css/input.css -o ./static/css/output.css --minify

      - name: Build Go packages
        run: go build ./...

      - name: Build server binary
        run: go build -o verse ./cmd/server

      - name: Start server (background)
        run: |
          nohup ./verse > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for server
        run: sleep 2

      - name: Smoke test GET /
        run: curl -fsS http://localhost:8080/

      - name: Smoke test POST /poem
        run: |
          curl -fsS -X POST -d "content=ci-test" http://localhost:8080/poem | grep -q "Bloom recorded."

      - name: Stop server
        if: always()
        run: |
          kill $(cat server.pid) || true
