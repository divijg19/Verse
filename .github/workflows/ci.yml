name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgres://verse:verse@localhost:5432/verse?sslmode=disable

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: verse
          POSTGRES_PASSWORD: verse
          POSTGRES_DB: verse
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U verse"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Bun dependencies
        run: bun ci

      # templ artifacts are committed; skipping regeneration to avoid generator/runtime mismatches

      - name: Build Tailwind CSS
        run: bunx @tailwindcss/cli -i ./static/css/input.css -o ./static/css/output.css --minify

      - name: Build Go packages
        run: go build ./...

      - name: Run go vet
        run: go vet ./...

      - name: Build server binary
        run: go build -o verse ./cmd/server

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 20); do
            if pg_isready -h localhost -U verse; then
              echo "Postgres is ready"
              exit 0
            fi
            echo "waiting for postgres... ($i/20)"
            sleep 1
          done
          echo "Postgres did not become ready"
          exit 1

      - name: Run migrations
        run: |
          psql "$DATABASE_URL" -f migrations/001_create_poems.sql

      - name: Start server (background)
        run: |
          nohup ./verse > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for server
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/ >/dev/null 2>&1; then
              echo "server is up"
              exit 0
            fi
            echo "waiting for server... ($i/30)"
            sleep 1
          done
          echo "server did not start within timeout; dumping server.log"
          if [ -f server.log ]; then
            echo "---- server.log (last 200 lines) ----"
            tail -n 200 server.log || true
            echo "-------------------------------------"
          else
            echo "server.log not found"
          fi
          curl -v http://localhost:8080/ || true
          exit 1

      - name: Smoke test GET /
        run: curl -fsS http://localhost:8080/

      - name: Smoke test POST /poem
        run: |
          curl -fsS -X POST -d "content=ci-test" http://localhost:8080/poem | grep -q "Bloom recorded."

      - name: Verify DB insert
        run: |
          psql -At -d "$DATABASE_URL" -c "SELECT count(*) FROM poems;" | tr -d ' ' | grep -q '^1$'

      - name: Stop server
        if: always()
        run: |
          kill $(cat server.pid) || true